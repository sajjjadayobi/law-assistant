version: '3.8'

services:
  # Phoenix Observability Platform
  phoenix:
    image: arizehq/phoenix:latest
    container_name: law-agent-phoenix
    ports:
      - "6006:6006"  # UI
      - "4317:4317"  # OTLP gRPC
      - "9090:9090"  # Prometheus metrics (optional)
    environment:
      PHOENIX_WORKING_DIR: /phoenix-data
      PHOENIX_SQL_DATABASE_URL: postgresql://phoenix:phoenix_password@postgres:5432/phoenix
      PHOENIX_PORT: "6006"
      PHOENIX_GRPC_PORT: "4317"
    volumes:
      - phoenix_data:/phoenix-data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - law-agent-network

  # PostgreSQL for Phoenix data storage
  postgres:
    image: postgres:15-alpine
    container_name: law-agent-postgres
    environment:
      POSTGRES_DB: law_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      # Create phoenix database
      POSTGRES_INITDB_ARGS: >
        -c shared_preload_libraries=pg_stat_statements
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - law-agent-network

  # Law Agent Application (Chainlit + Agent)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: law-agent-app
    ports:
      - "8000:8000"  # Chainlit UI
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:postgres_password@postgres:5432/law_agent
      DB_USER: postgres
      DB_PASSWORD: postgres_password
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: law_agent

      # Anthropic API
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # OpenTelemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: http://phoenix:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_SERVICE_NAME: law-agent
      OTEL_RESOURCE_ATTRIBUTES: service.name=law-agent,service.version=1.0.0

      # Application
      LOG_LEVEL: INFO
      CHAINLIT_HOST: 0.0.0.0
      CHAINLIT_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      phoenix:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - chainlit_data:/app/.chainlit
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - law-agent-network
    command: python -m chainlit run src/law_agent/ui/app.py --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
    driver: local
  phoenix_data:
    driver: local
  chainlit_data:
    driver: local

networks:
  law-agent-network:
    driver: bridge
