version: '3.8'

services:
  # PostgreSQL Database (shared by app and Phoenix)
  postgres:
    image: postgres:15-alpine
    container_name: law-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: law_agent
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./init-db.sh:/docker-entrypoint-initdb.d/02-init.sh
      - ./docs/architecture/migration/schema.sql:/docker-entrypoint-initdb.d/03-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - law-agent-network
    command: postgres -c log_statement=all

  # Phoenix Observability Platform
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: law-agent-phoenix
    ports:
      - "6006:6006"  # UI
      - "4317:4317"  # OTLP gRPC
      - "9090:9090"  # Prometheus metrics
    environment:
      PHOENIX_WORKING_DIR: /phoenix-data
      PHOENIX_SQL_DATABASE_URL: postgresql://phoenix:phoenix_password@postgres:5432/phoenix
      PHOENIX_PORT: "6006"
      PHOENIX_GRPC_PORT: "4317"
    volumes:
      - phoenix_data:/phoenix-data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6006/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - law-agent-network

  # Law Agent Application (Chainlit + PydanticAI Agent)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: law-agent-app
    ports:
      - "8000:8000"  # Chainlit UI
    environment:
      # Database Configuration
      DB_USER: postgres
      DB_PASSWORD: postgres_password
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: law_agent
      DATABASE_URL: postgresql://postgres:postgres_password@postgres:5432/law_agent

      # Chainlit Configuration
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET:-dev-secret-key-change-in-production}
      CHAINLIT_HOST: 0.0.0.0
      CHAINLIT_PORT: 8000

      # LLM API Configuration (model-agnostic via LiteLLM)
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_AUTH_TOKEN: ${LLM_AUTH_TOKEN}

      # Phoenix observability endpoint (used by health check + feedback client)
      PHOENIX_ENDPOINT: http://phoenix:6006

      # OpenTelemetry & Phoenix Integration
      OTEL_EXPORTER_OTLP_ENDPOINT: http://phoenix:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_SERVICE_NAME: law-agent
      OTEL_RESOURCE_ATTRIBUTES: service.name=law-agent,service.version=0.0.2

      # Logging & Application Configuration
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOGGING_FORMAT: ${LOGGING_FORMAT:-text}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    depends_on:
      postgres:
        condition: service_healthy
      phoenix:
        condition: service_started

    volumes:
      # Mount source for live reloading during development
      - ./src:/app/src
      - ./config.yaml:/app/config.yaml
      - ./.chainlit:/app/.chainlit
      - ./public:/app/public
      - chainlit_data:/app/.files

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - law-agent-network

    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local
  phoenix_data:
    driver: local
  chainlit_data:
    driver: local

networks:
  law-agent-network:
    driver: bridge
