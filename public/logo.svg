<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="#E84855" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Scale base -->
  <rect x="45" y="145" width="110" height="12" rx="3" fill="#E84855"/>

  <!-- Scale pole -->
  <line x1="100" y1="50" x2="100" y2="145" stroke="#E84855" stroke-width="5"/>

  <!-- Left pan -->
  <rect x="35" y="105" width="40" height="25" rx="3" fill="none" stroke="#E84855" stroke-width="4"/>
  <line x1="50" y1="105" x2="65" y2="65" stroke="#E84855" stroke-width="4"/>

  <!-- Right pan -->
  <rect x="125" y="105" width="40" height="25" rx="3" fill="none" stroke="#E84855" stroke-width="4"/>
  <line x1="150" y1="105" x2="135" y2="65" stroke="#E84855" stroke-width="4"/>

  <!-- Top balance beam -->
  <line x1="65" y1="65" x2="135" y2="65" stroke="#E84855" stroke-width="5"/>
  <circle cx="100" cy="65" r="5" fill="#E84855"/>
</svg>