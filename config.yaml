# Law Agent Configuration
#
# This file contains all configuration for the Law Agent application.
#
# IMPORTANT: Secrets (passwords, API keys) should NEVER be put here!
# Use environment variables instead (.env file or set in shell).
#
# Configuration priority (highest to lowest):
# 1. Environment variables (DB_PASSWORD, LLM_AUTH_TOKEN, LLM_BASE_URL, etc.)
# 2. Values in this file (config.yaml)
# 3. Hardcoded defaults in Pydantic models

# ============================================================================
# MODEL CONFIGURATION
# ============================================================================
# LLM model settings (model-agnostic)
model:
  # Name of the LLM model to use
  # For custom endpoints, use the model name supported by your provider
  name: "gpt-4.1-mini"

  # Temperature controls randomness/creativity (0.0 = deterministic, 2.0 = very creative)
  # 0.0 = always same output
  # 1.0 = balanced (recommended for legal assistant)
  # 2.0 = maximum diversity
  # Keep in range 0.0-2.0 per Anthropic guidelines
  temperature: 1.0

  # Maximum tokens per response
  # Increase for longer answers, decrease to save costs
  # Max: 16000 for safety (model supports more)
  max_tokens: 4000

  # Number of retries for transient errors
  # Higher = more resilience, but slower failure detection
  retries: 1


# ============================================================================
# DATABASE CONFIGURATION
# ============================================================================
# PostgreSQL database for legal documents
# NOTE: password must be set via DB_PASSWORD environment variable!
database:
  # PostgreSQL host
  host: "localhost"

  # PostgreSQL port
  port: 5432

  # Database name
  database: "law_agent"

  # Database user
  # NOTE: Set to the actual PostgreSQL user on your system
  # On macOS with Homebrew, this is typically the current user (e.g., "divar")
  # To find your PostgreSQL user: psql -d postgres -c "\du"
  # Can be overridden by DB_USER environment variable (requires code change to Settings class)
  user: "divar"

  # Database password - SET VIA ENVIRONMENT VARIABLE
  # Do NOT put password here! Use:
  #   export DB_PASSWORD="your-password"
  #   or in .env: DB_PASSWORD=your-password
  # This field is required and must be provided via DB_PASSWORD environment variable
  password: ""

  # Connection pool size (minimum number of connections to maintain)
  # Typical range: 5-20 depending on workload
  # Higher = more connections held, better for concurrent requests
  # Lower = fewer resources, but slower under load
  pool_size: 5

  # Maximum overflow connections (beyond pool_size)
  # When pool is full, create up to this many additional connections
  # Typical range: 5-20
  max_overflow: 10

  # Enable SQL logging (for debugging)
  # true = log all SQL queries (VERY verbose, development only)
  # false = no query logging (production)
  echo: false

# ============================================================================
# SEARCH CONFIGURATION
# ============================================================================
# Full-text search over legal documents
search:
  # Maximum number of documents to return per search
  # Higher = more results to consider, but slower and higher cost
  # Typical range: 10-50
  max_results: 20

  # Maximum depth for following document relations (citations)
  # Example: search → related documents → their related documents
  # Higher = more thorough but slower
  # Typical range: 1-3
  graph_traversal_depth: 2

  # Minimum relevance score threshold (0.0-1.0)
  # Only return documents with score >= this value
  # Higher = stricter filtering, fewer but more relevant results
  # Typical range: 0.2-0.5
  min_relevance_score: 0.3

  # Hard limit on search results (maximum caller can request)
  # Prevents excessive DB load from misbehaving callers
  hard_limit: 100

  # Default limit for related documents search
  # Caller can request different, but clamped to hard_limit
  related_docs_default_limit: 10

  # Relevance score decrement per result position
  # Used to rank results by relevance: first = 1.0, then 0.95, 0.90, etc.
  # Higher = more distinction between results, lower = flatter ranking
  relevance_score_step: 0.05

  # Maximum tags to include per search result
  # Reduces token usage by limiting metadata returned to LLM
  # Typical range: 2-5
  max_tags_per_result: 3

  # Maximum relations to prefetch when getting document details
  # Used to determine if a document has related documents worth showing
  # Higher = better coverage, but slower for docs with many relations
  relations_prefetch_limit: 1000

  # Relevance score assigned to related documents
  # Related documents get a fixed high score (assumed relevant via citation)
  # Typical range: 0.8-0.95
  related_docs_relevance_score: 0.9

# ============================================================================
# CONVERSATION CONFIGURATION
# ============================================================================
# Multi-turn conversation behavior and limits
conversation:
  # Hard limit on conversation turns (message pairs)
  # Used to prevent runaway costs from extended conversations
  # Typical limit: 50 turns (100 messages)
  # Min: 5, Max: 500
  max_turns: 50

  # Whether to use conversation history for context
  # true = agent can reference previous messages
  # false = agent sees only current message
  enable_context_history: true

# ============================================================================
# RATE LIMITING CONFIGURATION
# ============================================================================
# Per-user daily request quota for fair usage
rate_limit:
  # Maximum requests per user per day (UTC)
  # 30 = reasonable limit to prevent abuse while allowing real use
  requests_per_day: 30

# ============================================================================
# UI CONFIGURATION
# ============================================================================
# Chainlit chat interface behavior
ui:
  # Show model thinking and reasoning to the user
  # true = transparent (user sees "thinking" section)
  # false = hidden (cleaner UI but less educational)
  show_thinking: true

  # Show tool calls and their parameters
  # true = user sees which documents were searched, what parameters
  # false = hidden (cleaner but less transparent)
  show_tool_calls: true

  # Enable thumbs up/down feedback buttons
  # true = collect user feedback (sent to observability)
  # false = no feedback (for privacy or testing)
  enable_feedback: true

  # Stream response tokens as they arrive (live typing effect)
  # true  = tokens appear one by one (requires a model that generates progressively)
  # false = full response sent at once after model completes
  #
  # NOTE: grok-4-1-fast-reasoning is a reasoning model — it thinks first (3–5s),
  # then dumps the full response in a rapid burst. All chunks arrive within milliseconds
  # of each other, so streaming is not visually observable with this model.
  # Enable when switching to a progressive-generation model (e.g. claude-sonnet, gpt-4o).
  enable_streaming: false

  # Example questions shown to user at conversation start (legacy, for reference)
  # List of 3-5 questions in Persian to guide users
  example_questions:
    - "قوانین مرتبط با بیمه را بیان کنید"
    - "مراحل ثبت شرکت چیست؟"
    - "حقوق و تکالیف کارفرما چیست؟"

  # Starter questions are now loaded from: prompts/starters.yaml
  # See that file to customize the starter questions

  # Base URL for citation links in agent responses
  # Citations appear as [N](base_url/doc_id) markdown links
  # Change to point to your law portal or documentation service
  citation_base_url: "https://iran.ir/en/law"

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
# Structured logging output with log rotation support
logging:
  # Log level threshold (DEBUG, INFO, WARNING, ERROR)
  # DEBUG = very detailed (development only)
  # INFO = normal operations (recommended for production)
  # WARNING = only unexpected situations
  # ERROR = only failures
  level: "INFO"

  # Log format
  # json = machine-parseable (production, integrates with observability)
  # text = human-readable (development, console)
  format: "text"
  # Production: Set to "json" for structured logs that integrate with observability
  # Override via LOGGING_FORMAT environment variable

  # Optional file path for log output
  # null/empty = logs to console/stderr only (recommended for Docker)
  # "/var/log/law-agent.log" = write to file with automatic rotation
  #
  # Log rotation: Automatically rotates when file size exceeds max_file_bytes
  # keeps backup_count previous files
  # This prevents disk space issues in long-running production deployments
  #
  # Leave null for console-only in development
  # Production: Set via LOGGING_FILE_PATH environment variable if file logging needed
  file_path: null

  # Maximum file size in bytes before rotation
  # 10485760 = 10 MB (default)
  # Set lower for frequent rotation, higher for fewer rotations
  max_file_bytes: 10485760

  # Number of backup log files to keep
  # When max_file_bytes is exceeded, rename current to .1, .2, etc.
  # Files beyond this count are deleted
  backup_count: 5

# ============================================================================
# OBSERVABILITY CONFIGURATION
# ============================================================================
# Tracing and feedback integration with Arize Phoenix
observability:
  # Phoenix endpoint for sending feedback and spans
  # Development: http://localhost:6006 (self-hosted)
  # Production: Update to your Phoenix deployment URL
  # Can be overridden via PHOENIX_ENDPOINT environment variable
  phoenix_endpoint: "http://localhost:6006"

  # HTTP timeout for feedback requests to Phoenix
  # Higher = more tolerant of slow networks, longer waits on timeouts
  # Typical range: 3-10 seconds
  http_timeout: 5.0
